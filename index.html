<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
TAL3A SMART ERP
</title>

<link rel="stylesheet"
href="css/style.css">

<link rel="stylesheet"
href="css/dashboard.css">

<link rel="stylesheet"
href="css/mobile.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="sidebar">

<div class="logo">

<i class="fa-solid fa-shirt"></i>

طَلَّة ERP

</div>

<button onclick="showPage('dashboard')">

<i class="fa-solid fa-chart-line"></i>

لوحة التحكم

</button>

<button onclick="showPage('pos')">

<i class="fa-solid fa-cash-register"></i>

الكاشير

</button>

<button onclick="showPage('inventory')">

<i class="fa-solid fa-box"></i>

المخزن

</button>

<button onclick="showPage('customers')">

<i class="fa-solid fa-users"></i>

العملاء

</button>

<button onclick="showPage('factory')">

<i class="fa-solid fa-industry"></i>

المصنع

</button>

<button onclick="showPage('tailors')">

<i class="fa-solid fa-scissors"></i>

الترزية

</button>

<button onclick="showPage('reports')">

<i class="fa-solid fa-file"></i>

التقارير

</button>

<button onclick="showPage('settings')">

<i class="fa-solid fa-gear"></i>

الإعدادات

</button>

</div>

<div class="main">

<!-- Dashboard -->

<section id="dashboard"
class="page">

<h1>

لوحة التحكم

</h1>

<div class="cards">

<div class="card">

<h3>مبيعات اليوم</h3>

<h2 id="todaySales">

0

</h2>

</div>

<div class="card">

<h3>الأرباح</h3>

<h2 id="todayProfit">

0

</h2>

</div>

<div class="card">

<h3>الفواتير</h3>

<h2 id="todayInvoices">

0

</h2>

</div>

<div class="card">

<h3>النواقص</h3>

<h2 id="lowStock">

0

</h2>

</div>

</div>

</section>

<!-- POS -->

<section id="pos"
class="page hidden">

<div class="posLayout">

<div class="productsArea">

<input
id="searchProduct"
placeholder="بحث سريع">

<div
id="productsGrid">

</div>

</div>

<div class="cartArea">

<h2>

سلة البيع

</h2>

<div
id="cartItems">

</div>

<div class="cartSummary">

<h3>

الإجمالي:

<span id="cartTotal">

0

</span>

</h3>

<button
onclick="checkout()">

إتمام البيع

</button>

</div>

</div>

</div>

</section>

<!-- Inventory -->

<section
id="inventory"
class="page hidden">

<h1>

إدارة المخزن

</h1>

<input
id="productName"
placeholder="اسم المنتج">

<input
id="productColor"
placeholder="اللون">

<input
id="productSize"
placeholder="المقاس">

<input
id="productCost"
placeholder="التكلفة">

<input
id="productPrice"
placeholder="سعر البيع">

<input
id="productQty"
placeholder="الكمية">

<button
onclick="saveProduct()">

حفظ

</button>

<table>

<thead>

<tr>

<th>المنتج</th>

<th>اللون</th>

<th>المقاس</th>

<th>الكمية</th>

<th>السعر</th>

</tr>

</thead>

<tbody
id="inventoryTable">

</tbody>

</table>

</section>

<!-- Customers -->

<section
id="customers"
class="page hidden">

<h1>

العملاء

</h1>

<table>

<thead>

<tr>

<th>الاسم</th>

<th>الهاتف</th>

<th>النقاط</th>

<th>VIP</th>

</tr>

</thead>

<tbody
id="customersTable">

</tbody>

</table>

</section>

<!-- Factory -->

<section
id="factory"
class="page hidden">

<h1>

إدارة المصنع

</h1>

<div class="factoryBoard">

<div>

<h3>

قص

</h3>

<div
id="cutStage">

</div>

</div>

<div>

<h3>

خياطة

</h3>

<div
id="sewStage">

</div>

</div>

<div>

<h3>

تشطيب

</h3>

<div
id="finishStage">

</div>

</div>

<div>

<h3>

جاهز

</h3>

<div
id="readyStage">

</div>

</div>

</div>

</section>

<!-- Tailors -->

<section
id="tailors"
class="page hidden">

<h1>

الترزية

</h1>

<table>

<thead>

<tr>

<th>الاسم</th>

<th>المستلم</th>

<th>المسلم</th>

<th>المستحق</th>

</tr>

</thead>

<tbody
id="tailorsTable">

</tbody>

</table>

</section>

<!-- Reports -->

<section
id="reports"
class="page hidden">

<h1>

التقارير

</h1>

<div
id="reportsArea">

</div>

</section>

<!-- Settings -->

<section
id="settings"
class="page hidden">

<h1>

الإعدادات

</h1>

<input
id="storeName"
placeholder="اسم المتجر">

<button>

حفظ

</button>

</section>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="js/firebase.js"></script>

<script src="js/app.js"></script>

<script src="js/dashboard.js"></script>

<script src="js/pos.js"></script>

<script src="js/inventory.js"></script>

<script src="js/customers.js"></script>

<script src="js/factory.js"></script>

<script src="js/tailors.js"></script>

<script src="js/reports.js"></script>

</body>
</html>
